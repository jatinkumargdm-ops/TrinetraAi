# Render.com one-click deploy config.
# In Render dashboard: New + → "Blueprint" → point at your repo → Apply.
services:
  - type: web
    name: trinetra-marauders-eye
    runtime: node
    plan: starter
    buildCommand: corepack enable && corepack prepare pnpm@9.15.0 --activate && pnpm install --no-frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trinetra-postgres
          property: connectionString

databases:
  - name: trinetra-postgres
    plan: free
    databaseName: trinetra
    user: trinetra

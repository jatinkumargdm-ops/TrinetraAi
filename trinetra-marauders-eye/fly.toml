# Fly.io deployment config. After installing flyctl:
#   fly launch --no-deploy --copy-config        # creates the app
#   fly postgres create --name trinetra-db      # provision Postgres
#   fly postgres attach trinetra-db             # sets DATABASE_URL secret
#   fly secrets set JWT_SECRET=$(openssl rand -base64 48)
#   fly deploy

app = "trinetra-marauders-eye"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = 5

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
